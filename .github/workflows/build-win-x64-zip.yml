name: Build Windows x64 ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
    paths:
      - ".github/workflows/build-win-x64-zip.yml"
      - "package.json"
      - "yarn.lock"
      - "arduino-ide-extension/**"
      - "electron-app/**"

jobs:
  build-win-x64-zip:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.17"
          cache: "yarn"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npx node-gyp install
          yarn install --frozen-lockfile

      - name: Build Windows x64 ZIP
        run: yarn build:win:x64

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: arduino-ide-windows-x64-zip
          path: electron-app/dist/*win*.zip
          if-no-files-found: error
